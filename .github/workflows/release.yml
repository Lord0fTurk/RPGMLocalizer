name: Release Build

on:
  push:
    tags:
      # Support both changelog-style tags (v0.6.4) and plain numeric tags (0.6.4).
      - 'v*'
      - '[0-9]*'

jobs:
  build:
    name: Build for ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
            artifact_name: dist/RPGMLocalizer-Windows.exe
            artifact_id: windows-build
          - os: ubuntu-latest
            label: Linux
            artifact_name: dist/RPGMLocalizer-Linux.AppImage
            artifact_id: linux-build
          - os: macos-latest
            label: macOS
            artifact_name: dist/RPGMLocalizer-MacOS.zip
            artifact_id: macos-build

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Generate Build Icons
        shell: bash
        run: |
          python - <<'PY'
          import subprocess
          import sys
          import tempfile
          from pathlib import Path

          from PIL import Image

          root = Path.cwd()
          source_icon = root / "icon.png"
          windows_icon = root / "icon.ico"
          macos_icon = root / "icon.icns"
          ico_sizes = [(16, 16), (24, 24), (32, 32), (48, 48), (64, 64), (128, 128), (256, 256)]
          icns_base_sizes = [16, 32, 128, 256, 512]

          if not source_icon.exists():
              raise FileNotFoundError(f"Missing source icon: {source_icon}")

          with Image.open(source_icon) as image:
              image.convert("RGBA").save(windows_icon, format="ICO", sizes=ico_sizes)
          print(f"Generated {windows_icon.name}")

          if sys.platform == "darwin":
              with tempfile.TemporaryDirectory() as temp_dir:
                  iconset_dir = Path(temp_dir) / "icon.iconset"
                  iconset_dir.mkdir(parents=True, exist_ok=True)

                  for size in icns_base_sizes:
                      normal_path = iconset_dir / f"icon_{size}x{size}.png"
                      subprocess.run([
                          "sips", "-z", str(size), str(size), str(source_icon), "--out", str(normal_path)
                      ], check=True)

                      if size <= 256:
                          retina_size = size * 2
                          retina_path = iconset_dir / f"icon_{size}x{size}@2x.png"
                          subprocess.run([
                              "sips", "-z", str(retina_size), str(retina_size), str(source_icon), "--out", str(retina_path)
                          ], check=True)

                  subprocess.run([
                      "iconutil", "-c", "icns", str(iconset_dir), "-o", str(macos_icon)
                  ], check=True)
              print(f"Generated {macos_icon.name}")
          else:
              print("Skipped icon.icns generation on non-macOS runner")
          PY

      - name: Verify Generated Icons
        shell: bash
        run: |
          python - <<'PY'
          import sys
          from pathlib import Path

          root = Path.cwd()
          required = [root / "icon.png", root / "icon.ico"]
          if sys.platform == "darwin":
              required.append(root / "icon.icns")

          missing = [str(path) for path in required if not path.exists()]
          if missing:
              raise FileNotFoundError("Missing generated icons: " + ", ".join(missing))
          print("Verified icons:", ", ".join(path.name for path in required))
          PY

      - name: Build with PyInstaller
        run: |
          pyinstaller RPGMLocalizer.spec

      - name: Package Windows
        if: matrix.os == 'windows-latest'
        run: |
          Copy-Item dist/RPGMLocalizer.exe dist/RPGMLocalizer-Windows.exe

      - name: Package Linux (AppImage)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          # Create AppDir structure
          mkdir -p AppDir/usr/bin
          cp dist/RPGMLocalizer AppDir/usr/bin/RPGMLocalizer
          chmod +x AppDir/usr/bin/RPGMLocalizer
          
          # Copy source icon
          cp icon.png AppDir/icon.png
          
          # Create .desktop file
          cat <<EOF > AppDir/rpgmlocalizer.desktop
          [Desktop Entry]
          Type=Application
          Name=RPGMLocalizer
          Exec=RPGMLocalizer
          Icon=icon
          Terminal=false
          Categories=Utility;
          EOF
          
          # Create AppRun symlink
          ln -s usr/bin/RPGMLocalizer AppDir/AppRun
          
          # Download and run appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          
          export ARCH=x86_64
          ./appimagetool-x86_64.AppImage --appimage-extract-and-run AppDir dist/RPGMLocalizer-Linux.AppImage

      - name: Package Linux (tar.gz)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          rm -rf portable
          mkdir -p portable/RPGMLocalizer
          cp dist/RPGMLocalizer portable/RPGMLocalizer/RPGMLocalizer
          cp RPGMLocalizer.sh portable/RPGMLocalizer/RPGMLocalizer.sh
          cp icon.png portable/RPGMLocalizer/icon.png
          cp LICENSE portable/RPGMLocalizer/LICENSE
          chmod +x portable/RPGMLocalizer/RPGMLocalizer
          chmod +x portable/RPGMLocalizer/RPGMLocalizer.sh
          tar -C portable -czf dist/RPGMLocalizer-Linux.tar.gz RPGMLocalizer

      - name: Package MacOS
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          zip -r RPGMLocalizer-MacOS.zip RPGMLocalizer.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_id }}
          path: ${{ matrix.artifact_name }}

      - name: Upload Linux tar.gz Artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-targz-build
          path: dist/RPGMLocalizer-Linux.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-assets

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: release-assets

      - name: Download MacOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: release-assets

      - name: Download Linux tar.gz Artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-targz-build
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/RPGMLocalizer-Windows.exe
            release-assets/RPGMLocalizer-Linux.AppImage
            release-assets/RPGMLocalizer-Linux.tar.gz
            release-assets/RPGMLocalizer-MacOS.zip
          body: ""
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
